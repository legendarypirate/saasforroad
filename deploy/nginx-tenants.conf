# /etc/nginx/sites-available/tenants
# All tenant zam sites: vlemj.rcos.mn, tenant2.rcos.mn, …
# ONE zam process on :3000 — no per-tenant nginx config needed.
#
# admin.rcos.mn and api.rcos.mn keep their own files (exact name beats *.rcos.mn).

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name *.rcos.mn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name *.rcos.mn;

    # Wildcard cert (certbot DNS challenge for *.rcos.mn + rcos.mn)
    ssl_certificate     /etc/letsencrypt/live/rcos.mn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rcos.mn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
