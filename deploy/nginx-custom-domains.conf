# Catch-all for CUSTOM domains (vlemj.mn, company2.mn, …)
# Customer only needs DNS → your VPS. No new nginx file per tenant.
#
# App resolves tenant from Host header (tenants.domain / tenants.domains).
# Keep sites-available/tenants for *.rcos.mn (wildcard cert).
# Keep admin + api as exact-name vhosts (they win over default_server).
#
# Install as: /etc/nginx/sites-available/custom-domains
# Enable:     ln -s ... sites-enabled/
#
# IMPORTANT: HTTPS for arbitrary domains needs either:
#   A) Cloudflare Proxy (customer CNAME → your target, orange cloud) — easiest
#   B) Caddy / Traefik on-demand TLS (auto Let's Encrypt when Host hits the box)
#   C) certbot hook when platform admin saves a custom domain
#
# This file alone handles HTTP (and HTTPS if you terminate TLS elsewhere,
# e.g. Cloudflare Flexible → HTTP origin).

# Any hostname not matched by admin / api / *.rcos.mn → zam
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Optional: ACME HTTP-01 if you later automate certbot per domain
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }
}

# Optional HTTPS catch-all ONLY if you use a single "fallback" cert
# (e.g. Cloudflare Full Strict still needs a valid cert, or you use
# self-signed + Cloudflare Flexible). Prefer Cloudflare or Caddy for SSL.
